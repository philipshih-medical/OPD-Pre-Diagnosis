<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>iPad 門診預診系統 v5.1</title>
  <meta name="theme-color" content="#224a7a" />
  <style>
    :root{
      --bg:#eef3f8;--card:#ffffff;--primary:#224a7a;--primary-2:#3d6699;--text:#18324a;--muted:#6d7f92;
      --line:#d7e0ea;--selected:#dce9f8;--danger:#b53b3b;--shadow:0 10px 30px rgba(24,50,74,.08);--radius:24px;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;padding:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;color:var(--text)}
    body{min-height:100vh}
    .app{max-width:900px;margin:0 auto;padding:24px 18px 64px}
    .topbar{background:linear-gradient(135deg,var(--primary),var(--primary-2));color:#fff;border-radius:28px;padding:24px;box-shadow:var(--shadow);margin-bottom:18px}
    .title{font-size:34px;font-weight:800;letter-spacing:.5px}
    .subtitle{font-size:16px;opacity:.92;margin-top:6px}
    .lang-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}
    .lang-btn,.choice,.nav-btn,.small-btn{border:none;cursor:pointer;transition:.15s ease;touch-action:manipulation}
    .lang-btn{background:rgba(255,255,255,.14);color:#fff;border:2px solid rgba(255,255,255,.28);padding:16px 10px;border-radius:18px;font-size:20px;font-weight:700;min-height:68px}
    .lang-btn.active{background:#fff;color:var(--primary);border-color:#fff}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:18px}
    .stephead{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:18px}
    .stepno{width:40px;height:40px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:var(--selected);color:var(--primary);font-weight:800;font-size:18px;flex:0 0 auto}
    .step-title{font-size:28px;font-weight:800;line-height:1.2}
    .step-desc{font-size:15px;color:var(--muted);margin-top:5px}
    .choices{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .choice{width:100%;text-align:left;background:#fff;border:2px solid var(--line);border-radius:20px;min-height:78px;padding:16px 18px;font-size:24px;font-weight:700;color:var(--text)}
    .choice.selected{border-color:var(--primary);background:var(--selected);color:var(--primary)}
    .choice.small{font-size:21px;min-height:72px}
    .checkbox-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    textarea,select,.input-box{width:100%;border:2px solid var(--line);border-radius:18px;background:#fff;font-size:22px;color:var(--text);padding:16px 18px;outline:none}
    textarea{min-height:140px;resize:vertical;font-family:inherit}
    .input-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .pill-row{display:flex;flex-wrap:wrap;gap:10px}
    .tag{display:inline-flex;align-items:center;padding:10px 14px;border-radius:999px;background:#f2f6fa;border:1px solid var(--line);font-size:16px;color:var(--muted)}
    .hidden{display:none !important}
    .nav{position:sticky;bottom:12px;z-index:20;background:rgba(238,243,248,.88);backdrop-filter:blur(12px);padding-top:6px}
    .nav-inner{display:flex;gap:12px}
    .nav-btn{flex:1;padding:18px 16px;border-radius:18px;font-size:22px;font-weight:800}
    .nav-btn.primary{background:var(--primary);color:#fff}
    .nav-btn.secondary{background:#fff;color:var(--primary);border:2px solid var(--line)}
    .small-btn{padding:14px 16px;border-radius:16px;font-size:18px;font-weight:800;background:#fff;color:var(--primary);border:2px solid var(--line)}
    .summary-box{background:#f8fbff;border:2px solid #cfe0f4;border-radius:20px;padding:18px;font-size:20px;line-height:1.7;white-space:pre-wrap}
    .alert{padding:14px 16px;border-radius:16px;background:#fff6f6;border:1px solid #f0cccc;color:#b53b3b;font-size:18px;line-height:1.6}
    .progress{display:flex;gap:8px;margin-top:16px}
    .dot{height:8px;flex:1;border-radius:99px;background:rgba(255,255,255,.25)}
    .dot.active{background:#fff}
    .section-label{font-size:18px;font-weight:800;margin:18px 0 10px}
    @media (max-width: 768px){
      .app{padding:16px 12px 72px}.title{font-size:28px}.lang-grid,.choices,.checkbox-grid,.input-row{grid-template-columns:1fr}.step-title{font-size:24px}.choice{font-size:22px}.nav-btn{font-size:20px}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title" id="appTitle">iPad 門診預診系統</div>
      <div class="subtitle" id="appSubtitle">請病患依序點選，系統會自動產出中文就診摘要</div>
      <div class="lang-grid">
        <button class="lang-btn active" data-lang="zh">中文</button>
        <button class="lang-btn" data-lang="vi">Tiếng Việt</button>
        <button class="lang-btn" data-lang="th">ไทย</button>
        <button class="lang-btn" data-lang="id">Bahasa Indonesia</button>
      </div>
      <div class="progress" id="progress"></div>
    </div>

    <div class="card step" data-step="0">
      <div class="stephead">
        <div>
          <div class="step-title" id="welcomeTitle">開始預診</div>
          <div class="step-desc" id="welcomeDesc">請先填寫基本資料，再依序點選症狀與需求。</div>
        </div>
      </div>
      <div class="input-row">
        <input class="input-box" id="patientName" placeholder="姓名 / Name" />
        <input class="input-box" id="patientId" placeholder="病歷號 / 護照號" />
      </div>
      <div class="input-row" style="margin-top:14px">
        <select class="input-box" id="gender">
          <option value="">請選擇性別</option>
          <option value="男">男</option>
          <option value="女">女</option>
          <option value="其他">其他</option>
        </select>
        <input class="input-box" id="birthDate" type="date" />
      </div>
      <div class="section-label" id="visitPurposeLabel">今天主要想看什麼問題？</div>
      <div class="choices" id="reasonChoices"></div>
    </div>

    <div class="card step hidden" data-step="1">
      <div class="stephead">
        <div class="stepno">1</div>
        <div style="flex:1">
          <div class="step-title" id="durationTitle">症狀持續多久？</div>
          <div class="step-desc" id="durationDesc">請點選最接近的時間。</div>
        </div>
      </div>
      <div class="choices" id="durationChoices"></div>
    </div>

    <div class="card step hidden" data-step="2">
      <div class="stephead">
        <div class="stepno">2</div>
        <div style="flex:1">
          <div class="step-title" id="detailTitle">細部症狀</div>
          <div class="step-desc" id="detailDesc">可複選，請選出目前最主要的不舒服。</div>
        </div>
      </div>
      <div id="detailArea"></div>
    </div>

    <div class="card step hidden" data-step="3">
      <div class="stephead">
        <div class="stepno">3</div>
        <div style="flex:1">
          <div class="step-title" id="allergyTitle">藥物過敏</div>
          <div class="step-desc" id="allergyDesc">若有藥物過敏，請點選並補充藥名。</div>
        </div>
      </div>
      <div class="choices" id="allergyChoices"></div>
      <div id="allergyTextWrap" class="hidden" style="margin-top:14px">
        <input class="input-box" id="allergyText" placeholder="請輸入過敏藥物名稱" />
      </div>
    </div>

    <div class="card step hidden" data-step="4">
      <div class="stephead">
        <div class="stepno">4</div>
        <div style="flex:1">
          <div class="step-title" id="certificateTitle">是否需要診斷證明？</div>
          <div class="step-desc" id="certificateDesc">請依需求點選。</div>
        </div>
      </div>
      <div class="choices" id="certificateChoices"></div>
      <div class="section-label" id="redFlagLabel">是否有以下警訊症狀？</div>
      <div class="checkbox-grid" id="redFlagChoices"></div>
      <div class="section-label" id="noteLabel">其他補充說明</div>
      <textarea id="freeNote" placeholder="可補充系統未提到的症狀、慢性病、旅遊史或其他需求"></textarea>
    </div>

    <div class="card step hidden" data-step="5">
      <div class="stephead">
        <div class="stepno">5</div>
        <div style="flex:1">
          <div class="step-title" id="summaryTitle">中文就診摘要</div>
          <div class="step-desc" id="summaryDesc">以下內容可直接提供醫師看診前參考。</div>
        </div>
      </div>
      <div id="redFlagAlert" class="alert hidden"></div>
      <div class="summary-box" id="summaryOutput"></div>
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px">
        <button class="small-btn" id="copyBtn">複製摘要</button>
        <button class="small-btn" id="restartBtn">完成並清除</button>
      </div>
      <div style="margin-top:14px" class="pill-row" id="summaryTags"></div>
    </div>

    <div class="nav">
      <div class="nav-inner">
        <button class="nav-btn secondary" id="prevBtn">上一步</button>
        <button class="nav-btn primary" id="nextBtn">下一步</button>
      </div>
    </div>
  </div>

const state = {lang:"zh",step:0,reason:"",duration:"",details:[],allergy:"",certificate:"",redFlags:[]};
const steps = [...document.querySelectorAll('.step')];
const progress = document.getElementById('progress');

function buildProgress(){
  progress.innerHTML="";
  for(let i=0;i<6;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<=state.step?' active':'');
    progress.appendChild(d);
  }
}

function btn(label, cls, onClick){
  const b=document.createElement('button');
  b.className=cls;
  b.type="button";
  b.textContent=label;
  b.addEventListener('click', onClick);
  return b;
}

function renderReasons(){
  const box=document.getElementById('reasonChoices');
  box.innerHTML="";
  reasons.forEach(r=>{
    const b=btn(r[state.lang], "choice", ()=>{
      state.reason=r.key;
      state.details=[];
      renderReasons();
      renderDetails();
    });
    if(state.reason===r.key) b.classList.add('selected');
    box.appendChild(b);
  });
}

function renderDurations(){
  const box=document.getElementById('durationChoices');
  box.innerHTML="";
  durations.forEach(d=>{
    const b=btn(d[state.lang], "choice small", ()=>{
      state.duration=d.zh;
      renderDurations();
    });
    if(state.duration===d.zh) b.classList.add('selected');
    box.appendChild(b);
  });
}

function renderAllergy(){
  const box=document.getElementById('allergyChoices');
  box.innerHTML="";
  allergyOptions.forEach(d=>{
    const b=btn(d[state.lang], "choice", ()=>{
      state.allergy=d.zh;
      document.getElementById('allergyTextWrap').classList.toggle('hidden', state.allergy!=="有");
      renderAllergy();
    });
    if(state.allergy===d.zh) b.classList.add('selected');
    box.appendChild(b);
  });
}

function renderCertificate(){
  const box=document.getElementById('certificateChoices');
  box.innerHTML="";
  certificateOptions.forEach(d=>{
    const b=btn(d[state.lang], "choice", ()=>{
      state.certificate=d.zh;
      renderCertificate();
    });
    if(state.certificate===d.zh) b.classList.add('selected');
    box.appendChild(b);
  });
}

function renderRedFlags(){
  const box=document.getElementById('redFlagChoices');
  box.innerHTML="";
  redFlags.forEach(r=>{
    const selected=state.redFlags.includes(r.zh);
    const b=btn(r[state.lang], "choice small", ()=>{
      if(selected){ state.redFlags=state.redFlags.filter(x=>x!==r.zh); }
      else{ state.redFlags.push(r.zh); }
      renderRedFlags();
    });
    if(selected) b.classList.add('selected');
    box.appendChild(b);
  });
}

function renderDetails(){
  const area=document.getElementById('detailArea');
  area.innerHTML="";
  const arr=detailTree[state.reason||"other"]||[];
  const section=document.createElement('div');
  section.className="checkbox-grid";
  arr.forEach(item=>{
    const selected=state.details.includes(item.zh);
    const b=btn(item[state.lang]||item.zh, "choice small", ()=>{
      if(selected){ state.details=state.details.filter(x=>x!==item.zh); }
      else{ state.details.push(item.zh); }
      renderDetails();
    });
    if(selected) b.classList.add('selected');
    section.appendChild(b);
  });
  area.appendChild(section);
}

function setTexts(){
  const t=i18n[state.lang];
  ["appTitle","appSubtitle","welcomeTitle","welcomeDesc","visitPurposeLabel","durationTitle","durationDesc","detailTitle","detailDesc","allergyTitle","allergyDesc","certificateTitle","certificateDesc","redFlagLabel","noteLabel","summaryTitle","summaryDesc"].forEach(id=>document.getElementById(id).textContent=t[id]);
  document.getElementById('prevBtn').textContent=t.prev;
  document.getElementById('nextBtn').textContent=state.step===5?t.finish:t.next;
  document.getElementById('copyBtn').textContent=t.copy;
  document.getElementById('restartBtn').textContent=t.restart;
  document.getElementById('patientName').placeholder=t.placeholderName;
  document.getElementById('patientId').placeholder=t.placeholderId;
  document.getElementById('gender').options[0].text=t.genderDefault;
  document.getElementById('allergyText').placeholder=t.allergyPlaceholder;
  document.getElementById('freeNote').placeholder=t.notePlaceholder;
}

function showStep(){
  steps.forEach((el,idx)=>el.classList.toggle('hidden', idx!==state.step));
  buildProgress();
  setTexts();
  document.getElementById('prevBtn').style.visibility=state.step===0?'hidden':'visible';
  if(state.step===5) generateSummary();
  window.scrollTo({top:0, behavior:'smooth'});
}

function validateStep(){
  const t=i18n[state.lang];
  if(state.step===0 && !state.reason){ alert(t.requiredReason); return false; }
  if(state.step===1 && !state.duration){ alert(t.requiredDuration); return false; }
  if(state.step===3 && !state.allergy){ alert(t.requiredAllergy); return false; }
  if(state.step===4 && !state.certificate){ alert(t.requiredCertificate); return false; }
  return true;
}

function generateSummary(){
  const reasonMap=Object.fromEntries(reasons.map(r=>[r.key,r.zh]));
  const name=document.getElementById('patientName').value.trim()||"未填姓名";
  const pid=document.getElementById('patientId').value.trim()||"未填";
  const gender=document.getElementById('gender').value||"未填";
  const birthDate=document.getElementById('birthDate').value||"未填";
  const allergyText=document.getElementById('allergyText').value.trim();
  const note=document.getElementById('freeNote').value.trim();

  const lines=[];
  lines.push(`基本資料：姓名 ${name}；性別 ${gender}；出生日期 ${birthDate}；病歷號/護照號 ${pid}。`);
  lines.push(`本次就診主因：${reasonMap[state.reason]||"未填"}。`);
  lines.push(`症狀持續時間：${state.duration||"未填"}。`);
  lines.push(`細部症狀：${state.details.length?state.details.join('、'):"未特別勾選"}。`);
  if(state.allergy==="有"){
    lines.push(`藥物過敏：有。${allergyText?`已知過敏藥物為：${allergyText}。`:"但尚未填寫具體藥名。"} `);
  }else if(state.allergy){
    lines.push(`藥物過敏：${state.allergy}。`);
  }
  lines.push(`診斷證明書需求：${state.certificate||"未填"}。`);
  if(state.redFlags.length){ lines.push(`紅旗警訊：${state.redFlags.join('、')}。建議優先評估。`); }
  else{ lines.push(`紅旗警訊：目前未主動勾選。`); }
  if(note){ lines.push(`其他補充：${note}`); }

  document.getElementById('summaryOutput').textContent=lines.join('\n');

  const alertBox=document.getElementById('redFlagAlert');
  if(state.redFlags.length){
    alertBox.classList.remove('hidden');
    alertBox.textContent=i18n[state.lang].warningPrefix+state.redFlags.join('、');
  }else{
    alertBox.classList.add('hidden');
  }

  const tags=document.getElementById('summaryTags');
  tags.innerHTML="";
  [reasonMap[state.reason]||"未分類", state.duration||"未填時間", state.certificate?`證明：${state.certificate}`:"未填", state.redFlags.length?"有警訊":"無警訊"].forEach(x=>{
    const s=document.createElement('span');
    s.className='tag';
    s.textContent=x;
    tags.appendChild(s);
  });
}

function resetAll(){
  state.step=0; state.reason=""; state.duration=""; state.details=[]; state.allergy=""; state.certificate=""; state.redFlags=[];
  document.getElementById('patientName').value="";
  document.getElementById('patientId').value="";
  document.getElementById('gender').value="";
  document.getElementById('birthDate').value="";
  document.getElementById('allergyText').value="";
  document.getElementById('freeNote').value="";
  document.getElementById('allergyTextWrap').classList.add('hidden');
  renderAll();
  showStep();
}

function renderAll(){
  renderReasons(); renderDurations(); renderDetails(); renderAllergy(); renderCertificate(); renderRedFlags(); setTexts();
}

document.querySelectorAll('.lang-btn').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.lang-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    state.lang=b.dataset.lang;
    renderAll();
    if(state.step===5) generateSummary();
  });
});

document.getElementById('prevBtn').addEventListener('click', ()=>{ if(state.step>0){ state.step--; showStep(); } });
document.getElementById('nextBtn').addEventListener('click', ()=>{
  if(state.step<5){
    if(!validateStep()) return;
    state.step++;
    showStep();
  }else{
    resetAll();
  }
});
document.getElementById('copyBtn').addEventListener('click', async ()=>{
  const text=document.getElementById('summaryOutput').textContent;
  try{
    await navigator.clipboard.writeText(text);
    document.getElementById('copyBtn').textContent=i18n[state.lang].copied;
    setTimeout(()=>document.getElementById('copyBtn').textContent=i18n[state.lang].copy, 1200);
  }catch(e){
    alert("無法自動複製，請手動選取文字。");
  }
});
document.getElementById('restartBtn').addEventListener('click', resetAll);

renderAll();
showStep();
</script>
</body>
